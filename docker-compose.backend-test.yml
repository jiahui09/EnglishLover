services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: englishlover
      POSTGRES_USER: englishlover
      POSTGRES_PASSWORD: englishlover
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U englishlover -d englishlover"]
      interval: 5s
      timeout: 3s
      retries: 20
  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      APP_VERSION: "1.0.0"
      DATABASE_URL: "postgres://englishlover:englishlover@postgres:5432/englishlover?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      AUTO_MIGRATE: "true"
      COOKIE_SECURE: "false"
      CONTRACT_TEST_EMAIL: "learner@example.com"
      CONTRACT_TEST_PASSWORD: "learner-password"
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
